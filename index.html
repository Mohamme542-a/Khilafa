<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البوابة الرسمية</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #d4af37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            border-bottom: 2px solid #d4af37;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
        }
        .video-section {
            background: #151515;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        video {
            width: 100%;
            border-radius: 5px;
            border: 1px solid #d4af37;
        }
        .news-card {
            background: #1a1a1a;
            border-right: 5px solid #d4af37;
            padding: 15px;
            margin-bottom: 15px;
        }
        h1, h2 { color: #d4af37; }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <h1>الأرشيف الإعلامي</h1>
</header>

<div class="container">
    <div class="video-section">
        <h2>آخر الإصدارات المرئية</h2>
        <video controls poster="https://via.placeholder.com/800x450/000/d4af37?text=اضغط+للمشاهدة">
            <source src="video.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>

    <div class="news-card">
        <h3>قسم الولايات</h3>
        <p>متابعة لآخر الأخبار والتقارير الميدانية من مختلف الأقاليم.</p>
    </div>

    <div class="news-card">
        <h3>صحيفة النبأ</h3>
        <p>الإصدارات الأسبوعية والتقارير الخاصة بصحيفة النبأ.</p>
    </div>
</div>

<div class="footer">
    جميع الحقوق محفوظة © 2026
</div>

</body>
</html>
